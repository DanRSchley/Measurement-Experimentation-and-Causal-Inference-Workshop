project:
  type: book
  output-dir: docs
  resources:
    - googlef3f6a6d3b59e593f.html

book:
  title: "Measurement, Experimentation, & Causal Inference"
  subtitle: "Advanced Methods Workshop · RSM"
  author: "Dan Schley"
  date: today
  site-url: "https://danrschley.github.io/Measurement-Experimentation-and-Causal-Inference-Workshop"
  repo-url: https://github.com/DanRSchley/Measurement-Experimentation-and-Causal-Inference-Workshop
  repo-actions: [issue]
  description: >
    A graduate-level open workshop on advanced research methods in management science.
    Covers psychometric measurement (CFA, EFA, HTMT, LCA), experimental design and
    power analysis, and causal inference (regression discontinuity, difference-in-differences,
    mediation analysis) — each module with worked R simulations and interactive diagnostics.
  open-graph:
    title: "Measurement, Experimentation, & Causal Inference — RSM Workshop"
    description: >
      Graduate open-access workshop: psychometric measurement, experimental design,
      and causal inference (RDD, DiD, mediation) with R simulations. Rotterdam School
      of Management, Erasmus University.
    image: "figs/og-preview.png"
  twitter-card:
    title: "Measurement, Experimentation, & Causal Inference"
    description: >
      Open graduate workshop: measurement, experiments, and causal inference with R.
    card-style: summary_large_image
    image: "figs/og-preview.png"
  sidebar:
    style: docked
    background: light
  chapters:
    - index.qmd
    - part: "Module 1: Measurement"
      chapters:
        - module-1/intro.qmd
        - module-1/part1.qmd
        - module-1/part2.qmd
        - module-1/part3.qmd
        - module-1/part4.qmd
        - module-1/part5.qmd
        - module-1/part6.qmd
    - part: "Module 2: Hypothesis Testing"
      chapters:
        - module-2/intro.qmd
        - module-2/part1.qmd
        - module-2/part2.qmd
        - module-2/part3.qmd
        - module-2/part4.qmd
        - module-2/part5.qmd
    - part: "Module 3: Causal Inference"
      chapters:
        - module-3/intro.qmd
        - module-3/part1.qmd
        - module-3/part2.qmd
        - module-3/part3.qmd
        - module-3/part4.qmd
        - module-3/part5.qmd
  appendices:
    - about.qmd
    - suggest.qmd

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: true
    code-tools:
      source: false
      toggle: true
      caption: "Show/Hide All Code"
    highlight-style: github
    df-print: kable

execute:
  warning: false
  message: false
  freeze: auto
